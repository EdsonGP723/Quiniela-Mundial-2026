services:
  - type: web
    name: quiniela-backend
    env: python
    rootDir: Backend
    buildCommand: "./build.sh"
    startCommand: "cd quiniela && gunicorn quiniela.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiniela-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "quiniela-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://quiniela-frontend.vercel.app"

  - type: psql
    name: quiniela-db
    plan: free
